name: Publish ThaiLuck

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ThaiLuck site
        shell: bash
        run: |
          cat payload.00 payload.01 payload.02 rem.00 rem.01 rem.02 rem.03 rem.04 | base64 -d > /tmp/thailuck-site.tgz
          mkdir -p _site
          tar -xzf /tmp/thailuck-site.tgz -C _site

      - name: Publish source files to main
        shell: bash
        run: |
          cp -a _site/. .
          rm -f site.part* payload.* rem.* DEPLOY_TRIGGER.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Publish ThaiLuck web app"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
