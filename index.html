<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#24133f"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>ดวงวันดี — ดวงวันนี้ของคุณ</title><style>body{margin:0;background:#120a24;color:#fff;font-family:system-ui;display:grid;place-items:center;min-height:100vh}.l{display:grid;gap:12px;text-align:center}.o{width:44px;height:44px;border:4px solid #ffffff33;border-top-color:#ffd166;border-radius:50%;margin:auto;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="l"><div class="o"></div><span>กำลังเปิดดวงวันนี้…</span></div><script>(async()=>{try{if('serviceWorker'in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}if('caches'in window){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}let x='';for(let i=1;i<=5;i++)x+=await(await fetch(`payload/${i}.txt?v=5`,{cache:'no-store'})).text();const b=atob(x.trim()),u=Uint8Array.from(b,c=>c.charCodeAt(0));const h=await new Response(new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(h);document.close()}catch(e){document.body.innerHTML='<p>โหลดไม่สำเร็จ กรุณารีเฟรชอีกครั้ง</p>'}})();</script></body></html>
